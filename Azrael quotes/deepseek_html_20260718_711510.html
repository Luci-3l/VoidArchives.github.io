        // Log and state
        let log = [];
        const logElement = document.getElementById('log');
        const messageElement = document.getElementById('message');
        const dayElement = document.getElementById('day');
        const toneElement = document.getElementById('tone');
        const tagsElement = document.getElementById('tags');

        // Randomizer
        function getRandomMessage() {
            const index = Math.floor(Math.random() * messages.length);
            return messages[index];
        }

        // Display a message
        function displayMessage(msg) {
            // Fade out
            messageElement.style.opacity = 0;
            toneElement.style.opacity = 0;
            tagsElement.style.opacity = 0;

            setTimeout(() => {
                messageElement.textContent = msg.text;
                dayElement.textContent = `DAY ${msg.day}`;
                toneElement.textContent = `Tone: ${msg.tone}`;
                tagsElement.textContent = `Tags: ${msg.tags.join(', ')}`;

                // Fade in
                messageElement.style.opacity = 1;
                toneElement.style.opacity = 1;
                tagsElement.style.opacity = 1;

                // Log
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                log.unshift(`[${timeStr}] Echo #${msg.day}: "${msg.text.substring(0, 40)}…"`);
                if (log.length > 5) log.pop();
                logElement.innerHTML = log.join('<br>');
            }, 300);
        }

        // Button click
        document.getElementById('randomize').addEventListener('click', () => {
            const msg = getRandomMessage();
            displayMessage(msg);
        });

        // Initial load log
        logElement.textContent = `${messages.length} echoes loaded. Click the button.`;
