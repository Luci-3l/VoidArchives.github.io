            font-weight: 600;
            background: linear-gradient(135deg, #e9c6ff, #b77eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #aaa9d4;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding-bottom: 0.4rem;

        .song-card {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 2rem;
            padding: 2rem 1.2rem;
            margin: 1.5rem 0 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s;

        .song-name {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1.3;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);

            margin-bottom: 0.85rem;

            font-weight: 500;
            color: #c9b6ff;
            letter-spacing: -0.2px;
            background: rgba(183, 126, 255, 0.15);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .empty-state {
            color: #b9b8e6;
            font-style: italic;
            padding: 1rem;
            font-size: 1.1rem;
        }

        button {
            background: linear-gradient(95deg, #7c4dff, #b77eff);

            font-size: 1.2rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;

            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 0.5rem;

            border-radius: 40px;

            font-size: 0.75rem;

    const displayDiv = document.getElementById('songDisplay');
    const playlistSpan = document.getElementById('playlistSize');
    const randomBtn = document.getElementById('randomButton');

    playlistSpan.textContent = `🎼 ${totalSongs} songs in the oracle`;

    function getRandomSong() {
        const randomIndex = Math.floor(Math.random() * totalSongs);
        const fullLine = songList[randomIndex];
        // Split at " – " (en dash with spaces) 
        const separatorIndex = fullLine.lastIndexOf(' – ');
        if (separatorIndex === -1) {
            // fallback
            return { song: fullLine, artist: "✨ mystical being" };
        }
        const songName = fullLine.substring(0, separatorIndex);
        const artistName = fullLine.substring(separatorIndex + 3);
        return { song: songName, artist: artistName };
    }

    function updateDisplay() {
        const { song, artist } = getRandomSong();
        displayDiv.innerHTML = `
            <div class="song-name">🎧 ${escapeHtml(song)}</div>
            <div class="artist-name">${escapeHtml(artist)}</div>
        `;
    }

    // simple escape to avoid any XSS (not strictly needed but safe)
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    randomBtn.addEventListener('click', () => {
        updateDisplay();
        // little playful vibration if supported? optional, but cool
        if (navigator.vibrate) navigator.vibrate(50);
    });

    // show initial random song on page load
    updateDisplay();
