<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✦ Nyunyu-chan · idea oracle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1e1029, #0d0712);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: rgba(30, 16, 41, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 3.5rem 1.5rem 3.5rem 1.5rem;
      padding: 2.5rem 2rem 2.8rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(180, 130, 220, 0.2), 0 0 30px rgba(160, 80, 200, 0.2);
      border: 1px solid rgba(200, 150, 255, 0.15);
      transition: all 0.2s ease;
    }

    /* ——— header ——— */
    .header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 2.1rem;
      font-weight: 400;
      letter-spacing: 1px;
      color: #e2d0f5;
      text-shadow: 0 0 12px #b77ce0, 0 0 30px #7d3c9e;
      background: linear-gradient(135deg, #e8d6ff, #c7a2f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Quicksand', 'Segoe UI', sans-serif;
    }

    .header .sub {
      margin-left: auto;
      font-size: 0.9rem;
      color: #b595d0;
      background: rgba(80, 40, 110, 0.35);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid #7b4f9e55;
      letter-spacing: 0.3px;
    }

    /* ——— quote / mantra ——— */
    .mantra {
      font-size: 0.95rem;
      color: #cbb0e6;
      background: rgba(50, 25, 70, 0.5);
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      display: inline-block;
      backdrop-filter: blur(4px);
      border: 1px solid #9d71c055;
      margin-bottom: 2rem;
      box-shadow: 0 0 15px #3e1f5522;
      font-style: italic;
    }

    .mantra span {
      color: #e3c6ff;
      font-weight: 500;
    }

    /* ——— idea display ——— */
    .idea-box {
      background: rgba(18, 8, 28, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 2rem 0.8rem 2rem 0.8rem;
      padding: 2rem 1.8rem;
      margin: 1.8rem 0 2.5rem;
      border-left: 4px solid #b07cd9;
      box-shadow: inset 0 0 30px #1f0d2e, 0 8px 20px rgba(0, 0, 0, 0.5);
      transition: all 0.25s ease;
      min-height: 130px;
      display: flex;
      align-items: center;
    }

    .idea-text {
      font-size: 1.3rem;
      line-height: 1.6;
      color: #f0e6fc;
      font-weight: 350;
      word-break: break-word;
      text-shadow: 0 0 6px #9060b0;
      letter-spacing: 0.2px;
      width: 100%;
    }

    .idea-text::before {
      content: "❀ ";
      color: #be92e6;
      font-size: 1.2rem;
    }

    /* ——— button ——— */
    .button-wrap {
      display: flex;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .btn-oracle {
      background: linear-gradient(145deg, #2e1842, #1b0e26);
      border: none;
      padding: 1rem 2.6rem;
      border-radius: 80px;
      font-size: 1.4rem;
      font-weight: 500;
      color: #e9d7fc;
      letter-spacing: 2px;
      box-shadow: 0 6px 0 #0d0513, 0 12px 30px #00000066, 0 0 20px #652b8b55;
      border: 1px solid #a371c966;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.12s linear;
      backdrop-filter: blur(4px);
      font-family: 'Quicksand', sans-serif;
    }

    .btn-oracle:hover {
      transform: scale(1.01);
      background: linear-gradient(145deg, #3c2254, #26143a);
      box-shadow: 0 4px 0 #0d0513, 0 16px 40px #00000088, 0 0 35px #8749b5;
      border-color: #bf8fec;
      color: #f7eeff;
    }

    .btn-oracle:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0d0513, 0 8px 24px #00000088;
    }

    .btn-oracle i {
      font-style: normal;
      font-size: 1.8rem;
      line-height: 1;
      filter: drop-shadow(0 0 6px #a16ad0);
    }

    /* ——— counter / small ——— */
    .footer-note {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #7d5f99;
      letter-spacing: 0.6px;
      border-top: 1px dashed #4e306a55;
      padding-top: 1.4rem;
    }

    .footer-note span {
      background: #24163355;
      padding: 0.15rem 0.9rem;
      border-radius: 40px;
      border: 1px solid #552f7755;
    }

    .footer-note .spiral {
      color: #b185d0;
    }

    /* ——— responsive ——— */
    @media (max-width: 500px) {
      .card { padding: 1.8rem 1.2rem; }
      .header h1 { font-size: 1.7rem; }
      .idea-box { padding: 1.5rem 1rem; }
      .idea-text { font-size: 1.1rem; }
      .btn-oracle { padding: 0.8rem 1.8rem; font-size: 1.2rem; }
    }

    /* ✦ tiny sparkle ✦ */
    .glow-text {
      background: radial-gradient(circle at 30% 20%, #d9b6ff, #a167d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

      // ——— randomizer ———

        if (!ideaList.length) {
          ideaDisplay.textContent = '🌱 the garden is empty… plant something!';
          return;
        }
        const randomIndex = Math.floor(Math.random() * ideaList.length);
        const selected = ideaList[randomIndex];
        ideaDisplay.textContent = selected;
      }

      // ——— event listener ———
      randomBtn.addEventListener('click', showRandomIdea);
